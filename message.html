    <!-- Global Footer (Mapped from JSON) -->
    
    <script>
            // Subtle Parallax effect on parchment texture
            window.addEventListener('scroll', () => {
                const scrolled = window.pageYOffset;
                document.body.style.backgroundPosition = `0 ${scrolled * 0.1}px`;
            });
    
            // Interactive focus animations for the inputs
            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.querySelector('label').classList.add('translate-x-1');
                    input.parentElement.querySelector('label').classList.add('transition-transform');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.querySelector('label').classList.remove('translate-x-1');
                });
            });
        </script>
